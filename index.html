<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy PR: Caribbean Skies 🇵🇷</title>
    <style>
        :root {
            --neon-gold: #ffea00;
            --deep-ocean: #004e92;
            --tropical-green: #2ecc71;
        }
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
            border-radius: 15px;
            overflow: hidden;
            border: 8px solid #222;
            background: #4facfe;
        }
        canvas {
            display: block;
            cursor: pointer;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            user-select: none;
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: 800;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            gap: 14px;
            flex-wrap: wrap;
        }

        .hud-row {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            pointer-events: all;
        }

        .hud-btn {
            padding: 10px 12px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.25);
            background: rgba(0,0,0,0.35);
            color: white;
            font-weight: 800;
            letter-spacing: 0.5px;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }

        .hud-btn:active { transform: translateY(1px); }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            backdrop-filter: blur(4px);
            transition: opacity 0.4s ease;
        }
        .hidden { opacity: 0; pointer-events: none; }
        h1 {
            font-size: 50px;
            margin: 0;
            background: linear-gradient(to bottom, var(--neon-gold), #B8860B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 0 rgba(0,0,0,0.3));
            font-weight: 900;
            font-style: italic;
        }
        .btn-start {
            margin-top: 30px;
            padding: 18px 50px;
            font-size: 22px;
            background: var(--neon-gold);
            color: #000;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 6px 0 #B8860B;
            transition: 0.1s;
            pointer-events: all;
        }
        .btn-start:active { transform: translateY(4px); box-shadow: 0 2px 0 #B8860B; }
        .subtitle { font-size: 18px; opacity: 0.9; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="ui-layer">
            <div class="stats-bar">
                <span id="score">SCORE: 0</span>
                <span id="level">LVL: 1</span>
                <span id="best">BEST: 0</span>
                <span id="lives">LIVES: 3</span>
            </div>

            <div class="hud-row">
                <button class="hud-btn" id="pauseBtn" title="Pause (P)">PAUSE</button>
                <button class="hud-btn" id="muteBtn" title="Mute (M)">SFX: ON</button>
                <button class="hud-btn" id="fsBtn" title="Fullscreen">FULL</button>
            </div>
        </div>

        <div id="overlay">
            <h1 id="overlayTitle">CARIBBEAN SKIES</h1>
            <p class="subtitle" id="overlaySubtitle">The Ultimate Cotorra Experience 🇵🇷</p>
            <p class="subtitle" id="overlayHint">Tap / Click / Space to flap</p>
            <button class="btn-start" id="startBtn">Start flight</button>
        </div>
    </div>
    <script src="js/game.js?v=1.2"></script>
</body>
</html>
